[defaults]
inventory = inventory
host_key_checking = False
# auto_silent: Ansible auto-detects Python on each remote host (Rocky Linux has /usr/bin/python3)
# Do NOT set this to your local Mac venv path — that path doesn't exist on remote VMs.
interpreter_python = auto_silent

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
